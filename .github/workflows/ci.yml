name: CI

on:
  push:
  pull_request:

jobs:
  # ---- Plasa de siguranta principala: regresia interna (rapida, determinista) ----
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instaleaza Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Regresie completa (make)
        run: make

  # ---- Conformitate RISCOF (mai grea: cere toolchain + spike + riscof) ----
  # Ruleaza pe o imagine cu toolchain-ul RISC-V preinstalat. Inlocuieste
  # 'container' cu imaginea ta sau adauga pasii de instalare a toolchain-ului.
  riscof:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/valifloricescu/riscof-pipe5:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    #if: ${{ false }} 
    steps:
      - uses: actions/checkout@v4
      - name: Instaleaza iverilog
        run:  apt-get update && apt-get install -y iverilog python3-pip
      - name: Ruleaza RISCOF
        run: |
          cd riscof
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/pipe5:$(pwd)/spike
          riscof run --config=config.ini \
            --suite=$RISCV_ARCH_TEST/riscv-test-suite/rv32i_m \
            --env=$RISCV_ARCH_TEST/riscv-test-suite/env
