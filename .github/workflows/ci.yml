name: CI

on:
  push:
  pull_request:

jobs:
  # ---- Plasa de siguranta principala: regresia interna (rapida, determinista) ----
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instaleaza Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Regresie completa (make)
        run: make

  # ---- Conformitate RISCOF (toolchain + spike + riscof din imagine) ----
  riscof:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/valifloricescu/riscof-pipe5:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Instaleaza iverilog
        run: apt-get update && apt-get install -y iverilog python3-pip

      # Rulam pe sub-suite ca sa excludem `pmp` (PMP nu e implementat in nucleu,
      # iar testele pmp sunt selectate de riscof doar pe baza extensiei I).
      # `|| true`: nu oprim la prima suita cu esecuri; verdictul e dat de "Rezumat".
      # Gaseste suita riscv-arch-test indiferent unde e (env var din imagine,
      # locatii standard, sau clone de rezerva). Esueaza ZGOMOTOS daca lipseste.
      - name: Localizeaza riscv-arch-test
        id: archtest
        run: |
          ARCH="${RISCV_ARCH_TEST:-}"
          if [ -z "$ARCH" ] || [ ! -d "$ARCH/riscv-test-suite" ]; then
            for c in /opt/riscv-arch-test /work/riscv-arch-test; do
              if [ -d "$c/riscv-test-suite" ]; then ARCH="$c"; break; fi
            done
          fi
          if [ -z "$ARCH" ] || [ ! -d "$ARCH/riscv-test-suite" ]; then
            echo "RISCV_ARCH_TEST nu e setat si nu exista nicio copie in imagine; clonez suita."
            apt-get install -y git > /dev/null
            git clone --depth 1 -b old-framework-3.x \
              https://github.com/riscv-non-isa/riscv-arch-test /tmp/riscv-arch-test
            ARCH=/tmp/riscv-arch-test
          fi
          echo "Suita riscv-arch-test: $ARCH"
          echo "path=$ARCH" >> "$GITHUB_OUTPUT"

      - name: Ruleaza RISCOF (I, M, privilege, hints)
        working-directory: riscof
        env:
          ARCH: ${{ steps.archtest.outputs.path }}
        run: |
          for suite in I M privilege hints; do
            echo "::group::rv32i_m/$suite"
            riscof run --config=config.ini \
              --suite=$ARCH/riscv-test-suite/rv32i_m/$suite \
              --env=$ARCH/riscv-test-suite/env \
              --work-dir=riscof_work/$suite \
              --no-browser 2>&1 | tee riscof_$suite.log || true
            echo "::endgroup::"
          done

      # Contorizeaza Passed/Failed din log-uri, scrie tabelul in Job Summary
      # si intoarce cod de eroare daca exista teste picate.
      - name: Rezumat teste (passed/failed)
        working-directory: riscof
        run: |
          total_p=0; total_f=0
          {
            echo "## Conformitate RISCOF — rv32i_m"
            echo ""
            echo "| Suita | Passed | Failed |"
            echo "|-------|-------:|-------:|"
          } >> "$GITHUB_STEP_SUMMARY"
          for suite in I M privilege hints; do
            p=$(grep -c ' : Passed' riscof_$suite.log || true)
            f=$(grep -c ' : Failed' riscof_$suite.log || true)
            total_p=$((total_p + p)); total_f=$((total_f + f))
            echo "| $suite | $p | $f |" >> "$GITHUB_STEP_SUMMARY"
          done
          {
            echo "| **Total** | **$total_p** | **$total_f** |"
            echo ""
            echo "_Suita \`pmp\` este exclusa: PMP nu este implementat in nucleu._"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "==================================================="
          echo "  TOTAL: $total_p passed, $total_f failed"
          echo "==================================================="
          # 0 teste rulate = infrastructura stricata, NU succes
          if [ "$total_p" -eq 0 ]; then
            echo "::error::Niciun test nu a rulat - verifica log-urile riscof_*.log din artefacte"
            exit 1
          fi
          test "$total_f" -eq 0

      # Pastreaza semnaturile, log-urile si report.html pentru depanare,
      # inclusiv (mai ales) cand testele pica.
      - name: Incarca artefactele RISCOF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscof-results
          path: |
            riscof/riscof_work
            riscof/riscof_*.log
          retention-days: 14
          if-no-files-found: warn
